name: Sync Notion Content to GitHub Pages

on:
  schedule:
    # Runs every hour. You can adjust this or trigger manually.
    - cron: '0 * * * *'
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  notion-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Fetch Notion Database and convert to Markdown
        uses: victornpb/notion-jam@v0.0.9
        with:
          NOTION_SECRET: ${{ secrets.NOTION_SECRET }}
          NOTION_DATABASE: ${{ secrets.NOTION_DATABASE_ID }}
          FILTER_PROP: Status
          FILTER_VALUES: Published
          # Saves the file in Jekyll's required _posts folder
          ARTICLE_PATH: _posts/{date}-{title}.md
          # Saves Notion images locally so they don't expire
          ASSETS_PATH: assets/images/
          # Automatically converts Notion properties like "Grid Placement" to "grid_placement"
          CONVERT_PROP_CASE: snake 

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Action Bot"
          git config user.email "action@github.com"
          git add _posts/ assets/images/
          git commit -m "Auto-sync Notion content to blog" || echo "No changes to commit"
          git push
