name: Sync Notion Content to GitHub Pages

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 

jobs:
  notion-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Fetch Notion Database and convert to Markdown
        uses: victornpb/notion-jam@v0.0.9
        with:
          NOTION_SECRET: ${{ secrets.NOTION_SECRET }}
          NOTION_DATABASE: ${{ secrets.NOTION_DATABASE_ID }}
          FILTER_PROP: Status
          FILTER_VALUES: Published
          ARTICLE_PATH: _posts/{date}-{title}.md
          ASSETS_PATH: assets/images/
          CONVERT_PROP_CASE: snake 

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Action Bot"
          git config user.email "action@github.com"
          git add _posts/ assets/images/
          git commit -m "Auto-sync Notion content to blog" || echo "No changes to commit"
          git push

      - name: Update Notion Status to Live and set Timestamp
        env:
          NOTION_SECRET: ${{ secrets.NOTION_SECRET }}
          DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          # 1. Get current time in ISO 8601 format
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          # 2. Query Notion for pages currently marked as "Published"
          # (These are the ones the previous step just synced)
          PAGE_IDS=$(curl -s -X POST "https://api.notion.com/v1/databases/$DATABASE_ID/query" \
            -H "Authorization: Bearer $NOTION_SECRET" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            --data '{
              "filter": {
                "property": "Status",
                "status": {
                  "equals": "Published"
                }
              }
            }' | jq -r '.results[].id')

          # 3. Loop through those specific pages and update them
          for id in $PAGE_IDS; do
            if [ "$id" != "null" ] && [ -n "$id" ]; then
              echo "Updating Notion page: $id"
              curl -s -X PATCH "https://api.notion.com/v1/pages/$id" \
                -H "Authorization: Bearer $NOTION_SECRET" \
                -H "Notion-Version: 2022-06-28" \
                -H "Content-Type: application/json" \
                --data '{
                  "properties": {
                    "Status": {
                      "status": {
                        "name": "Live"
                      }
                    },
                    "Last Synced to GitHub": {
                      "date": {
                        "start": "'$TIMESTAMP'"
                      }
                    }
                  }
                }'
            fi
          done
