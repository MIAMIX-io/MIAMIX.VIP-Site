name: MIAMIX VIP
description: MIAMIX Curated Lifestyle
url: "https://miamix.vip"

# Automatically apply the post.html layout to everything in the _posts folder
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# This uses your custom Notion 'URL Slug' property to build the web address
permalink: /:slug/
